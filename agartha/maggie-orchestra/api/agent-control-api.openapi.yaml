openapi: 3.1.0
info:
  title: Symphony Agent Control API
  version: 0.2.0
  description: Local control API for Symphony orchestration, retrieval, residents, docs, and workspace merge jobs.
servers:
  - url: http://localhost:18890
paths:
  /workspace/merge:
    post:
      summary: Merge source documents into a target workspace notebook
      operationId: workspaceMerge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspaceMergeRequest'
      responses:
        '200':
          description: Merge completed or validated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceMergeResponse'
        '400':
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal processing error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /workspace/merge/latest:
    get:
      summary: Get latest workspace merge job
      operationId: workspaceMergeLatest
      responses:
        '200':
          description: Latest merge job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceMergeLatestResponse'
        '404':
          description: No merge jobs yet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    WorkspaceMergeSource:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          description: Source type. Supported values are `file` and `repo`.
          enum:
            - file
            - repo
        path:
          type: string
          description: Required for `file` sources.
        localPath:
          type: string
          description: Required for `repo` sources (existing local directory).
        url:
          type: string
          description: Optional metadata for remote repo URL.
        ref:
          type: string
          description: Optional metadata for branch/tag/commit.
    MergePolicy:
      type: object
      properties:
        mode:
          type: string
          example: append_with_dedupe
        priority:
          type: array
          items:
            type: string
          example:
            - target
            - newer_source
        conflict:
          type: string
          example: preserve_both_with_tags
    WorkspaceMergeRequest:
      type: object
      required:
        - sourceDocs
        - targetDoc
        - notebookId
      properties:
        sourceDocs:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/WorkspaceMergeSource'
        targetDoc:
          type: string
        notebookId:
          type: string
        mergePolicy:
          $ref: '#/components/schemas/MergePolicy'
        chunkSize:
          type: integer
          minimum: 1
          default: 1200
        overlap:
          type: integer
          minimum: 0
          default: 120
        dryRun:
          type: boolean
          default: false
    WorkspaceMergeResponse:
      type: object
      properties:
        ok:
          type: boolean
          const: true
        jobId:
          type: string
        status:
          type: string
          enum:
            - completed
            - validated
        targetDoc:
          type: string
        notebookId:
          type: string
        merge:
          type: object
          additionalProperties: true
        locations:
          type: object
          additionalProperties: true
        timestamp_utc:
          type: string
          format: date-time
    WorkspaceMergeLatestResponse:
      type: object
      properties:
        ok:
          type: boolean
          const: true
        merge:
          type: object
          additionalProperties: true
        source:
          type: string
        timestamp_utc:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      properties:
        ok:
          type: boolean
          const: false
        error:
          type: string
